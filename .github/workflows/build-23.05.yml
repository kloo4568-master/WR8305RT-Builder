name: OpenWrt 23.05 Builder

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true

      - name: Initialize environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo bash -c 'bash <(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo timedatectl set-timezone ${TZ}
          sudo mkdir -p /workdir
          sudo chown $USER:$USER /workdir

      - name: Check disk
        run: df -hT

      - name: Clone ImmortalWrt
        working-directory: /workdir
        run: |
          git clone \
            --depth=1 \
            --single-branch \
            -b ${REPO_BRANCH} \
            ${REPO_URL} \
            openwrt

          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate configuration
        run: |
          cd openwrt

          cat > .config <<EOF
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7620=y
          CONFIG_TARGET_ramips_mt7620_DEVICE_zbtlink_zbt-wr8305rt=y

          CONFIG_PACKAGE_luci=y

          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb-storage=y

          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_e2fsprogs=y

          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_miniupnpd=y

          CONFIG_PACKAGE_luci-app-qos=y
          CONFIG_PACKAGE_tc=y
          EOF

          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j$(nproc)

          find dl -size -1024c -exec rm -f {} \;

      - name: Compile
        run: |
          cd openwrt
          make -j$(nproc) V=s || make -j1 V=s

      - name: Generate build time
        run: |
          echo "DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
          echo "TIME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
                - name: Organize firmware
        run: |
          cd openwrt/bin/targets/ramips/mt7620

          rm -f *.buildinfo
          rm -f sha256sums
          rm -f profiles.json

          mkdir -p release

          cp *.bin release/ 2>/dev/null || true
          cp *.itb release/ 2>/dev/null || true
          cp *.img release/ 2>/dev/null || true
          cp *.manifest release/ 2>/dev/null || true
          cp *.kernel release/ 2>/dev/null || true
          cp *.config release/ 2>/dev/null || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: WR8305RT-ImmortalWrt-23.05-${{ env.TIME }}
          path: |
            openwrt/bin/targets/ramips/mt7620/release/*
          retention-days: 30

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: WR8305RT-23.05-${{ env.DATE }}
          name: WR8305RT ImmortalWrt 23.05
          generate_release_notes: true
          files: |
            openwrt/bin/targets/ramips/mt7620/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 3
          keep_minimum_runs: 5
